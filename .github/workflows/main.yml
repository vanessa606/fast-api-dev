name: Node.js CI & K6 Load Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Build & Unit Tests
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  # Job 2: K6 Load Test 
  k6-load-test:
    runs-on: ubuntu-latest
    needs: build # IMPORTANTE: Esto asegura que la prueba de carga solo corra si los unit tests pasaron
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run K6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js # Asegúrate de que este archivo esté en la raíz de tu proyecto
